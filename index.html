<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SipSky | Refresh Your Soul</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #e0f7fa; }

        .drink-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, #b2ebf2 0%, #e0f7fa 100%);
        }

        .main-card {
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            display: flex;
            box-shadow: 0 20px 40px rgba(0,131,143,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Left Side: Information */
        .info-panel {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }

        .category {
            color: #00838f;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #004d40;
            line-height: 1;
            margin-bottom: 20px;
            font-style: italic;
        }

        p {
            color: #455a64;
            line-height: 1.8;
            margin-bottom: 35px;
            font-size: 1.05rem;
            max-width: 400px;
        }

        .sip-btn {
            padding: 15px 40px;
            background: #00838f;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.4s;
            width: fit-content;
            box-shadow: 0 10px 20px rgba(0,131,143,0.2);
        }

        .sip-btn:hover { 
            background: #004d40;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,131,143,0.3);
        }

        /* Right Side: Visuals */
        .visual-panel {
            flex: 1.2;
            position: relative;
            background: #00838f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .drink-bg {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=1887') no-repeat center center/cover;
            filter: brightness(0.9);
            transition: 0.8s ease-in-out;
        }

        .main-card:hover .drink-bg {
            transform: scale(1.1);
        }

        .overlay-text {
            position: absolute;
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            bottom: -20px;
            right: -20px;
            user-select: none;
        }

        /* Floating Element */
        .ice-cube {
            position: absolute;
            top: 20%;
            right: 15%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            text-align: center;
            animation: drift 4s infinite ease-in-out;
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="drink-wrapper">
        <div class="main-card">
            <div class="info-panel">
                <span class="category">Premium Mocktails</span>
                <h1>Pure <br>Iced Bliss.</h1>
                <p>Chill out with our artisanal collection of cold-pressed juices and sparkling summer infusions.</p>
                
                <a href="#" class="sip-btn">Sip Now</a>
            </div>

            <div class="visual-panel">
                <div class="drink-bg"></div>
                <div class="overlay-text">FRESH</div>
                <div class="ice-cube">
                    <span style="font-size: 1.2rem; display: block;">❄️</span>
                    <span style="font-weight: 800; font-size: 0.8rem;">CHILLED</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
